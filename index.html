<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>懂我再說 🎭</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <link rel="stylesheet" href="css/style.css">
</head>

<body style="background:linear-gradient(135deg,#fdf4ff 0%,#f0f9ff 50%,#fdf2f8 100%);min-height:100vh;overflow-x:hidden">

  <!-- ── Floating background emojis ── -->
  <div style="position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0" aria-hidden="true">
    <span class="float-emoji" style="font-size:52px;top:4%;left:4%;animation-delay:0s">🎭</span>
    <span class="float-emoji" style="font-size:40px;top:8%;right:7%;animation-delay:1.4s">✨</span>
    <span class="float-emoji" style="font-size:36px;top:22%;left:10%;animation-delay:0.7s">🎪</span>
    <span class="float-emoji" style="font-size:44px;top:18%;right:18%;animation-delay:2.1s">💫</span>
    <span class="float-emoji" style="font-size:48px;top:45%;left:2%;animation-delay:1.1s">🌈</span>
    <span class="float-emoji" style="font-size:36px;top:55%;right:4%;animation-delay:0.4s">🎉</span>
    <span class="float-emoji" style="font-size:44px;bottom:22%;left:7%;animation-delay:1.7s">🎊</span>
    <span class="float-emoji" style="font-size:50px;bottom:8%;right:11%;animation-delay:0.2s">🦋</span>
    <span class="float-emoji" style="font-size:34px;bottom:35%;left:22%;animation-delay:2.4s">⭐</span>
    <span class="float-emoji" style="font-size:40px;top:60%;right:22%;animation-delay:0.9s">🌸</span>
  </div>

  <!-- ── Config warning ── -->
  <div id="config-warning" class="hidden"
       style="background:linear-gradient(90deg,#FEF3C7,#FDE68A);padding:10px 20px;text-align:center;
              font-weight:700;font-size:13px;color:#92400E;position:relative;z-index:10">
    ⚠️ 請在 <code style="background:#FDE68A;padding:2px 6px;border-radius:4px">js/config.js</code>
    填入 Supabase 設定後才能使用
  </div>

  <!-- ── Main ── -->
  <div style="position:relative;z-index:10;min-height:100vh;
              display:flex;flex-direction:column;align-items:center;justify-content:center;
              padding:40px 16px">

    <!-- Hero -->
    <div class="animate__animated animate__bounceInDown" style="text-align:center;margin-bottom:36px">
      <img src="logo.svg" alt="懂我再說"
           style="width:min(480px,90vw);height:auto;filter:drop-shadow(0 8px 28px rgba(139,92,246,.35));margin-bottom:12px">
      <p style="font-size:16px;color:#A78BFA;font-weight:700;margin-bottom:3px">多人互動猜測遊戲</p>
      <p style="font-size:14px;color:#C4B5FD;font-weight:600">選擇・猜測・揭曉・看看朋友有多了解你！</p>
    </div>

    <!-- Action cards -->
    <div class="animate__animated animate__fadeInUp animate__delay-1s"
         style="width:100%;max-width:860px;display:grid;
                grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px">

      <!-- Create Room -->
      <div class="game-card">
        <div style="width:62px;height:62px;border-radius:18px;
                    background:linear-gradient(135deg,#7C3AED,#A855F7);
                    display:flex;align-items:center;justify-content:center;
                    font-size:28px;margin-bottom:14px;
                    box-shadow:0 8px 24px rgba(124,58,237,.3)">🏠</div>
        <h2 style="font-size:22px;font-weight:900;color:#1F2937;margin-bottom:4px">建立新房間</h2>
        <p style="font-size:13px;color:#9CA3AF;font-weight:600;margin-bottom:20px">
          邀請朋友一起猜猜你！
        </p>

        <div style="display:flex;flex-direction:column;gap:12px">
          <div class="input-wrapper">
            <span class="input-icon">😊</span>
            <input id="create-nickname" type="text" placeholder="你的暱稱" maxlength="12" class="game-input">
          </div>
          <div class="input-wrapper">
            <span class="input-icon">👥</span>
            <select id="create-max-players" class="game-input" style="padding-left:44px;cursor:pointer">
              <option value="4">最多 4 人</option>
              <option value="6" selected>最多 6 人</option>
              <option value="8">最多 8 人</option>
              <option value="10">最多 10 人</option>
              <option value="12">最多 12 人</option>
            </select>
          </div>
          <button id="create-btn" onclick="handleCreateRoom()" class="btn-primary">
            建立房間 🚀
          </button>
        </div>
      </div>

      <!-- Join Room -->
      <div class="game-card">
        <div style="width:62px;height:62px;border-radius:18px;
                    background:linear-gradient(135deg,#F472B6,#EC4899);
                    display:flex;align-items:center;justify-content:center;
                    font-size:28px;margin-bottom:14px;
                    box-shadow:0 8px 24px rgba(236,72,153,.3)">🎪</div>
        <h2 style="font-size:22px;font-weight:900;color:#1F2937;margin-bottom:4px">加入房間</h2>
        <p style="font-size:13px;color:#9CA3AF;font-weight:600;margin-bottom:20px">
          輸入朋友分享的房間碼
        </p>

        <div style="display:flex;flex-direction:column;gap:12px">
          <div class="input-wrapper">
            <span class="input-icon" style="left:50%;transform:translateX(-50%);font-size:0">
            </span>
            <input id="join-code" type="text" placeholder="房間碼（6碼）" maxlength="6"
                   class="game-input"
                   style="text-align:center;letter-spacing:7px;font-size:22px;
                          font-weight:900;padding-left:0;padding-right:0"
                   oninput="this.value=this.value.toUpperCase()">
          </div>
          <div class="input-wrapper">
            <span class="input-icon">😊</span>
            <input id="join-nickname" type="text" placeholder="你的暱稱" maxlength="12" class="game-input">
          </div>
          <button id="join-btn" onclick="handleJoinRoom()" class="btn-secondary">
            加入房間 ✨
          </button>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <p class="animate__animated animate__fadeIn animate__delay-2s"
       style="margin-top:36px;color:#DDD6FE;font-size:13px;font-weight:700;text-align:center">
      Made with 💜 · 最多12人同時遊玩 · Supabase 即時同步
    </p>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/questions.js"></script>
  <script src="js/identity.js"></script>
  <script src="js/db.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/index-page.js"></script>
</body>
</html>
