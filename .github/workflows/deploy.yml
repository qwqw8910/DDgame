# =====================================================
#  懂我再說 — GitHub Actions 自動部署 Vue 3 到 GitHub Pages
#
#  需在 GitHub 設定 Repository Secrets：
#    Settings > Secrets and variables > Actions > New repository secret
#    - VITE_SUPABASE_URL       ← Supabase Project URL
#    - VITE_SUPABASE_ANON_KEY  ← Supabase anon public key
#    - VITE_SOCKET_URL         ← 後端 URL（Render）
#                                 例：https://ddgame-ok10.onrender.com
# =====================================================

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main          # 推送到 main 分支時自動觸發
  workflow_dispatch:  # 允許手動觸發

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vue-app/package-lock.json

      - name: 📦 Install dependencies
        working-directory: vue-app
        run: npm ci

      - name: 🏗️ Build Vue app
        working-directory: vue-app
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SOCKET_URL: ${{ secrets.VITE_SOCKET_URL }}
        run: npm run build

      - name: 📋 Copy admin.html to dist
        run: cp admin.html vue-app/dist/admin.html

      - name: 🛠️ Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: 📦 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'vue-app/dist'

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

